<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKS1K</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .main-title {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .neon-btn {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00f0ff;
            border-radius: 15px;
            padding: 12px;
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .neon-btn:hover {
            box-shadow: 0 0 20px #00f0ff;
        }

        .btn-img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
        }

        .btn-uc {
            height: 80px;
            padding: 0;
            justify-content: center;
        }

        .uc-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        .uc-text {
            position: absolute;
            font-weight: 800;
            font-size: 22px;
            text-shadow: 0 0 5px #000;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-title">ROKS1K</div>

        <div class="links-list">
            <a href="https://t.me/pubgmobile76ua" target="_blank" class="neon-btn">
                <img src="main.jpg" class="btn-img">
                <span>Основной ТГК</span>
            </a>

            <a href="https://t.me/roksus" target="_blank" class="neon-btn btn-uc">
                <img src="ucbot.png" class="uc-img">
                <span class="uc-text">UC BOT</span>
            </a>

            <a href="https://t.me/rocksminecraft" target="_blank" class="neon-btn">
                <img src="minecraft.jpg" class="btn-img">
                <span>По Minecraft ТГК</span>
            </a>

            <a href="https://tiktok.com/@roks1k3" target="_blank" class="neon-btn">
                <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="btn-img" style="filter: invert(1);">
                <span>TikTok Профиль</span>
            </a>
        </div>
    </div>

</body>
</html>
