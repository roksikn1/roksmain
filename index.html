<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROKS1K</title>
    <style>
        /* Базовые настройки и размытый атмосферный фон */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Затемнение фона для лучшей читаемости текста */
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), 
                        url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
        }

        /* Основной контейнер */
        .wrapper {
            width: 100%;
            max-width: 430px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Главная пафосная надпись с неоновым свечением */
        .main-title {
            font-size: 54px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 35px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 
                0 0 5px #00f0ff,
                0 0 10px #00f0ff,
                0 0 20px #00f0ff,
                0 0 40px #00f0ff;
        }

        /* Контейнер для кнопок-ссылок */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Общий стиль для неоновых кнопок */
        .neon-btn {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.55);
            border: 2px solid #00f0ff;
            border-radius: 16px;
            padding: 12px 18px;
            text-decoration: none;
            color: #ffffff;
            font-size: 19px;
            font-weight: 600;
            transition: all 0.25s ease-in-out;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Эффект яркого свечения при наведении */
        .neon-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.85), inset 0 0 10px rgba(0, 240, 255, 0.4);
            background: rgba(0, 0, 0, 0.7);
        }

        /* Квадратные иконки со скруглением для обычных кнопок */
        .btn-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Выравнивание текста влево внутри обычных кнопок */
        .btn-label {
            flex-grow: 1;
            text-align: left;
        }

        /* Специальный стиль для кнопки UC BOT (во всю ширину с баннером) */
        .btn-uc {
            padding: 0;
            justify-content: center;
            height: 76px;
        }

        /* Баннер внутри кнопки UC BOT */
        .uc-banner {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.75;
            transition: opacity 0.25s ease;
        }

        .neon-btn:hover .uc-banner {
            opacity: 0.95;
        }

        /* Текст поверх баннера UC BOT */
        .uc-text {
            position: relative;
            z-index: 5;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.9);
        }

        /* Иконка TikTok (встроенный SVG, чтобы не качать отдельно) */
        .tiktok-icon {
            width: 40px;
            height: 40px;
            margin-right: 22px;
            margin-left: 4px;
            fill: #ffffff;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-title">ROKS1K</div>

        <div class="links-list">

            <a href="https://t.me/pubgmobile76ua" target="_blank" class="neon-btn">
                <img src="main.jpg" alt="Основной ТГК" class="btn-avatar">
                <span class="btn-label">Основной ТГК</span>
            </a>

            <a href="https://t.me/roksus" target="_blank" class="neon-btn btn-uc">
                <img src="ucbot.png" alt="UC BOT" class="uc-banner">
                <span class="uc-text">UC BOT</span>
            </a>

            <a href="https://t.me/rocksminecraft" target="_blank" class="neon-btn">
                <img src="minecraft.jpg" alt="По Minecraft ТГК" class="btn-avatar">
                <span class="btn-label">По Minecraft ТГК</span>
            </a>

            <a href="https://tiktok.com/@roks1k3" target="_blank" class="neon-btn">
                <svg class="tiktok-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.03 1.62 4.2 1.13 1.25 2.72 2.03 4.34 2.29v3.83c-1.42-.07-2.83-.56-4.01-1.37-.67-.47-1.25-1.07-1.7-1.77v6.62c.04 2.19-.71 4.39-2.18 6.03-1.63 1.77-4.04 2.67-6.42 2.43-2.32-.17-4.52-1.44-5.74-3.41-1.41-2.22-1.46-5.18-.12-7.46 1.22-2.1 3.51-3.44 5.92-3.53v3.91c-1.21.13-2.38.83-2.96 1.9-.66 1.19-.58 2.78.22 3.88.79 1.05 2.13 1.57 3.42 1.34 1.23-.19 2.28-1.18 2.53-2.39.11-.64.08-1.3.08-1.96V0h.01z"/>
                </svg>
                <span class="btn-label">TikTok Профиль</span>
            </a>

        </div>
    </div>

</body>
</html>
